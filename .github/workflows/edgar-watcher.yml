name: EDGAR Watcher

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

# Never let two runs overlap while one is committing state back.
concurrency:
  group: edgar-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Run EDGAR watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: npx tsx edgar_watcher.ts

      - name: Persist dedupe state
        run: |
          if git diff --quiet -- seen_filings.json; then
            echo "No state changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_filings.json
          git commit -m "chore: update EDGAR dedupe state [skip ci]"
          git pull --rebase --autostash
          git push
